<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img{
            position: absolute;
            width: 200px;
        }
    </style>
</head>
<body>
    <img src="https://images.unsplash.com/photo-1596492784531-6e6eb5ea9993?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fGRvZ3xlbnwwfHwwfHx8MA%3D%3D" alt="">

    <script>
        let move = document.querySelector("img")
        let moveX = 0
        let moveY = 0
        document.body.addEventListener("keydown", (e)=>{
            if(e.code == 'ArrowRight'){
                moveX++
            }
            if(e.code == 'ArrowLeft'){
                if(moveX>0){
                    moveX--
                }
            }
            if(e.code == 'ArrowUp'){
                if(moveY>0){
                    moveY--
                } 
            
            }
            if(e.code == 'ArrowDown'){
                moveY++
            }
            move.style.left = moveX+'%'
            move.style.top = moveY+'%'
        })
    </script>
</body>
</html>
